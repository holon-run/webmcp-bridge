name: Deploy Board

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-board.yml"
      - "examples/board/**"
      - "docs/images/bridge-architecture.png"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: deploy-board-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @webmcp-bridge/example-board build

      - run: pnpm exec wrangler pages deploy examples/board/dist --project-name=board --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
